<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="cyblue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="purp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" rx="12" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="url(#cyblue)">Swarm Oracle Architecture</text>
  <text x="450" y="52" text-anchor="middle" font-size="10" fill="#9ca3af">Calibration-Weighted Multi-Agent Prediction Consensus</text>

  <!-- Question Input -->
  <rect x="330" y="65" width="240" height="36" rx="8" fill="#1f2937" stroke="#374151" filter="url(#shadow)"/>
  <text x="450" y="88" text-anchor="middle" font-size="11" fill="#06b6d4">Question Input (CLI / API)</text>

  <!-- Arrow down -->
  <line x1="450" y1="101" x2="450" y2="120" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#374151"/></marker></defs>

  <!-- Verifier -->
  <rect x="310" y="120" width="280" height="36" rx="8" fill="#111827" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="143" text-anchor="middle" font-size="11" fill="#e5e7eb">verifier.py — ThreadPool Orchestrator</text>

  <!-- Agent boxes -->
  <rect x="80" y="185" width="200" height="70" rx="8" fill="#111827" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#10b981">agent-oracle</text>
  <text x="180" y="223" text-anchor="middle" font-size="9" fill="#9ca3af">strategy: API lookup</text>
  <text x="180" y="238" text-anchor="middle" font-size="9" fill="#9ca3af">Brier: 0.08 · weight: 60%</text>

  <rect x="350" y="185" width="200" height="70" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b82f6">agent-reliable</text>
  <text x="450" y="223" text-anchor="middle" font-size="9" fill="#9ca3af">strategy: web search</text>
  <text x="450" y="238" text-anchor="middle" font-size="9" fill="#9ca3af">Brier: 0.15 · weight: 34%</text>

  <rect x="620" y="185" width="200" height="70" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="720" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#f59e0b">agent-novice</text>
  <text x="720" y="223" text-anchor="middle" font-size="9" fill="#9ca3af">strategy: knowledge</text>
  <text x="720" y="238" text-anchor="middle" font-size="9" fill="#9ca3af">Brier: n/a · weight: 6%</text>

  <!-- Lines from verifier to agents -->
  <line x1="370" y1="156" x2="180" y2="185" stroke="#374151" stroke-width="1.5"/>
  <line x1="450" y1="156" x2="450" y2="185" stroke="#374151" stroke-width="1.5"/>
  <line x1="530" y1="156" x2="720" y2="185" stroke="#374151" stroke-width="1.5"/>

  <!-- Lines from agents to consensus -->
  <line x1="180" y1="255" x2="370" y2="295" stroke="#374151" stroke-width="1.5"/>
  <line x1="450" y1="255" x2="450" y2="295" stroke="#374151" stroke-width="1.5"/>
  <line x1="720" y1="255" x2="530" y2="295" stroke="#374151" stroke-width="1.5"/>

  <!-- Consensus + Weights -->
  <rect x="280" y="295" width="340" height="50" rx="8" fill="#111827" stroke="url(#cyblue)" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="316" text-anchor="middle" font-size="11" font-weight="bold" fill="#e5e7eb">consensus.py + weights.py</text>
  <text x="450" y="333" text-anchor="middle" font-size="9" fill="#9ca3af">Weighted linear opinion pool · Dispute detection</text>

  <!-- Arrow down to decision -->
  <line x1="450" y1="345" x2="450" y2="375" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision output -->
  <rect x="350" y="375" width="80" height="30" rx="6" fill="#10b981" fill-opacity="0.2" stroke="#10b981"/>
  <text x="390" y="395" text-anchor="middle" font-size="10" font-weight="bold" fill="#10b981">YES</text>
  <rect x="440" y="375" width="80" height="30" rx="6" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444"/>
  <text x="480" y="395" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444">NO</text>
  <rect x="530" y="375" width="90" height="30" rx="6" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b"/>
  <text x="575" y="395" text-anchor="middle" font-size="10" font-weight="bold" fill="#f59e0b">DISPUTE</text>

  <!-- Arrow down to on-chain -->
  <line x1="450" y1="405" x2="450" y2="435" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- On-chain layer label -->
  <rect x="60" y="430" width="780" height="200" rx="10" fill="#111827" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="450" y="452" text-anchor="middle" font-size="10" fill="#8b5cf6" font-weight="bold">BASE SEPOLIA L2 — On-Chain Verification Layer</text>

  <!-- Contract boxes -->
  <rect x="80" y="465" width="180" height="65" rx="8" fill="#1f2937" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="#8b5cf6">CalibrationRegistry</text>
  <text x="170" y="503" text-anchor="middle" font-size="8" fill="#9ca3af">Brier storage + WAD</text>
  <text x="170" y="516" text-anchor="middle" font-size="8" fill="#9ca3af">weight computation</text>

  <rect x="280" y="465" width="180" height="65" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b82f6">SwarmConsensus</text>
  <text x="370" y="503" text-anchor="middle" font-size="8" fill="#9ca3af">Vote aggregation +</text>
  <text x="370" y="516" text-anchor="middle" font-size="8" fill="#9ca3af">resolution events</text>

  <rect x="480" y="465" width="180" height="65" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="#10b981">RewardDistribution</text>
  <text x="570" y="503" text-anchor="middle" font-size="8" fill="#9ca3af">ETH pools · 70/30 split</text>
  <text x="570" y="516" text-anchor="middle" font-size="8" fill="#9ca3af">Pull-payment pattern</text>

  <rect x="680" y="465" width="145" height="65" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="752" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="#f59e0b">AgentIdentity</text>
  <text x="752" y="503" text-anchor="middle" font-size="8" fill="#9ca3af">Soulbound ERC-721</text>
  <text x="752" y="516" text-anchor="middle" font-size="8" fill="#9ca3af">Reputation NFTs</text>

  <!-- Reads weights arrow -->
  <line x1="260" y1="497" x2="280" y2="497" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="270" y="490" text-anchor="middle" font-size="7" fill="#8b5cf6" transform="rotate(-90 270 490)">reads</text>

  <!-- Feedback loop -->
  <rect x="200" y="555" width="500" height="55" rx="8" fill="#0a0e1a" stroke="url(#grn)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="576" text-anchor="middle" font-size="10" font-weight="bold" fill="#10b981">Self-Improving Feedback Loop</text>
  <text x="450" y="593" text-anchor="middle" font-size="9" fill="#9ca3af">Resolution → Brier update → Weight recalculation → DPO training data</text>

  <!-- Feedback arrows -->
  <path d="M 170 530 L 170 582 L 200 582" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <path d="M 700 582 L 752 582 L 752 530" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>

  <!-- Stats bar -->
  <text x="450" y="640" text-anchor="middle" font-size="9" fill="#6b7280">108 tests · 29 scored forecasts · mean Brier 0.157 · 3.3s consensus · zero external deps</text>
</svg>
